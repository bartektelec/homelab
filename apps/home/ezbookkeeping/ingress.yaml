apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ezbookkeeping-traefik
  namespace: ezbookkeeping
  annotations:
    spec.ingressClassName: ezbookkeeping
spec:
  rules:
    - http:
        paths:
          - path: /ezbookkeep
            pathType: Prefix
            backend:
              service:
                name: ezbookkeeping
                port:
                  name: http
