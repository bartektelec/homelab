apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: maybe-ingress-traefik
  namespace: maybe
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
    - http:
        paths:
          - path: /maybe
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  name: http
